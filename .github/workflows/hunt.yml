name: 🎯 Bounty Hunter

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to scrape (all = scrape everything)'
        default: 'all'
        type: choice
        options: [all, immunefi, code4rana, sherlock, gitcoin]
      dry_run:
        description: 'Dry run (no submissions, just analysis)'
        default: true
        type: boolean
      max_bounties:
        description: 'Max bounties to analyze per platform'
        default: '5'

concurrency:
  group: bounty-hunter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install patchright
          python -m patchright install --with-deps chromium
          python -m playwright install --with-deps chromium

      - name: 🩺 Health Check
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          python -m src.health || true

      - name: 🔍 Run Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          MAX_BOUNTIES_PER_RUN: ${{ github.event.inputs.max_bounties || '5' }}
        run: |
          python -m src.pipeline \
            --platform "${{ github.event.inputs.platform || 'all' }}" \
            --max-bounties "$MAX_BOUNTIES_PER_RUN" \
            --dry-run "$DRY_RUN"

      - name: 📸 Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hunt-${{ github.run_id }}
          path: |
            state/
            cache/
            evidence/
            reports/
          if-no-files-found: ignore
          retention-days: 14
