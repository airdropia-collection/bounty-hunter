name: 🎯 Bounty Hunter

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to scrape (all = scrape everything)'
        default: 'all'
        type: choice
        options: [all, immunefi, code4rena, sherlock, issuehunt]
      dry_run:
        description: 'Dry run (no submissions, just analysis)'
        default: true
        type: boolean
      max_bounties:
        description: 'Max bounties to analyze per platform'
        default: '5'

concurrency:
  group: bounty-hunter-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install patchright
          python -m patchright install --with-deps chromium
          python -m playwright install --with-deps chromium

      # ──────────────────────────────────────────────────────────── #
      # MASTER BRAKE (agent.md §2)
      # If system_status in state.json is "PAUSED", skip this run
      # entirely. The user toggles this from Telegram.
      # ──────────────────────────────────────────────────────────── #
      - name: 🛑 Check PAUSED state
        id: brake
        run: |
          if [ ! -f state.json ]; then
            echo "state.json missing — initializing (treating as RUNNING)"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          STATUS=$(python3 -c "import json; print(json.load(open('state.json')).get('system_status','RUNNING').upper())")
          echo "system_status = $STATUS"
          if [ "$STATUS" = "PAUSED" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "🛑 System is PAUSED — skipping hunt run"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "▶️ System is RUNNING — proceeding with hunt"
          fi

      - name: 🩺 Health Check
        if: steps.brake.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
        run: |
          python -m src.health || true

      - name: 🔍 Run Pipeline
        if: steps.brake.outputs.skip != 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_REPO: ${{ github.repository }}
          ETH_RPC_URL: ${{ secrets.ETH_RPC_URL }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          WALLET_ADDRESS: ${{ secrets.WALLET_ADDRESS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          MAX_BOUNTIES_PER_RUN: ${{ github.event.inputs.max_bounties || '5' }}
        run: |
          python -m src.pipeline \
            --platform "${{ github.event.inputs.platform || 'all' }}" \
            --max-bounties "$MAX_BOUNTIES_PER_RUN" \
            --dry-run "$DRY_RUN"

      - name: 📸 Upload Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hunt-${{ github.run_id }}
          path: |
            state/
            cache/
            evidence/
            reports/
          if-no-files-found: ignore
          retention-days: 14
