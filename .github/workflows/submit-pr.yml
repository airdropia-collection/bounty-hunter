name: 🚀 Submit PR

on:
  workflow_dispatch:
    inputs:
      upstream_repo:
        description: 'Upstream repo (owner/repo)'
        required: true
      upstream_branch:
        description: 'Upstream base branch'
        default: 'master'
      fork_branch:
        description: 'Fork branch with fix'
        required: true
      pr_title:
        description: 'PR title'
        required: true
      pr_body:
        description: 'PR body (single line)'
        required: true

jobs:
  submit_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to commit state.json update
    steps:
      - name: Checkout repo (so we can update state.json + run onboarding check)
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ──────────────────────────────────────────────────────────────── #
      # PLATFORM ONBOARDING GATE (agent.md §4.0)
      # Verifies that the bot's GitHub account has completed all required
      # platform-specific actions (follow / star / CLA / etc.) BEFORE
      # submitting the PR. If any requirement is missing, the PR submission
      # is BLOCKED and a 🛡️ FILTER Telegram event is emitted.
      #
      # This prevents recurrence of the 2026-07-17 incident where PR #252
      # was blocked by the MergeOS maintainer for missing Gate 1 (badges).
      # ──────────────────────────────────────────────────────────────── #
      - name: 🛡️ Platform Onboarding Gate
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -m src.utils.platform_onboarding "${{ github.event.inputs.upstream_repo }}" \
            && echo "✅ Onboarding complete — proceeding with PR submission" \
            || (
              echo "❌ Onboarding INCOMPLETE — PR submission blocked (agent.md §4.0)"
              echo "Complete the missing actions listed in the Telegram 🛡️ FILTER alert,"
              echo "then re-trigger this workflow."
              exit 1
            )

      # ──────────────────────────────────────────────────────────────── #
      # NATURAL DEVELOPER PERSONA FILTER (agent.md §6, Cycle 13)
      # Sanitizes PR title + body BEFORE the GitHub API call to strip:
      #   - [BOUNTY $X] / [$X USD] prefixes
      #   - "🤖 bot:" / "AI:" / "Here is the fix:" prefaces
      #   - markdown template signatures (## Summary, tables, emoji)
      #   - bot signature strings
      # Rules centralized in src/config.py:NATURAL_PERSONA.
      # Enforced by src/utils/persona.py.
      # ──────────────────────────────────────────────────────────────── #
      - name: 🎭 Apply Natural Persona Filter
        env:
          PR_TITLE: ${{ github.event.inputs.pr_title }}
          PR_BODY: ${{ github.event.inputs.pr_body }}
        run: |
          python -m src.utils.persona --kind pr_title --text "$PR_TITLE" --json > /tmp/pr_title_clean.json
          python -m src.utils.persona --kind pr_body  --text "$PR_BODY"  --json > /tmp/pr_body_clean.json
          CLEAN_TITLE=$(python3 -c "import json;print(json.load(open('/tmp/pr_title_clean.json'))['sanitized'])")
          CLEAN_BODY=$(python3 -c "import json;print(json.load(open('/tmp/pr_body_clean.json'))['sanitized'])")
          echo "Persona filter applied:"
          python3 -c "import json; t=json.load(open('/tmp/pr_title_clean.json')); print(f'  title: changed={t[\"changed\"]!r}')"
          python3 -c "import json; b=json.load(open('/tmp/pr_body_clean.json'));  print(f'  body:  changed={b[\"changed\"]!r}')"
          # Export sanitized values to subsequent steps via GITHUB_ENV.
          # Use the multi-line delimiter format for PR_BODY_CLEAN because the
          # body legitimately spans multiple lines (and may contain quotes /
          # apostrophes). The simple "KEY=value" format breaks on the first
          # newline or unescaped quote — see GitHub Actions docs:
          # https://docs.github.com/actions/using-workflows/workflow-commands-for-github-actions#setting-an-environment-variable
          echo "PR_TITLE_CLEAN=$CLEAN_TITLE" >> $GITHUB_ENV
          {
            echo "PR_BODY_CLEAN<<EOF"
            echo "$CLEAN_BODY"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Create PR via GitHub API
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          PR_TITLE: ${{ env.PR_TITLE_CLEAN }}
          PR_BODY: ${{ env.PR_BODY_CLEAN }}
          FORK_BRANCH: ${{ github.event.inputs.fork_branch }}
          UPSTREAM_BRANCH: ${{ github.event.inputs.upstream_branch }}
          UPSTREAM_REPO: ${{ github.event.inputs.upstream_repo }}
        run: |
          # Use jq to safely construct JSON (handles $, newlines, quotes in title/body)
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg head "airdropia-collection:$FORK_BRANCH" \
            --arg base "$UPSTREAM_BRANCH" \
            --arg body "$PR_BODY" \
            '{title: $title, head: $head, base: $base, body: $body}')
          echo "Constructed PR payload ($(echo "$PAYLOAD" | wc -c) bytes)"
          RESPONSE=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/$UPSTREAM_REPO/pulls")
          echo "$RESPONSE"
          PR_URL=$(echo "$RESPONSE" | python3 -c "import json,sys;print(json.load(sys.stdin).get('html_url','FAILED'))" 2>/dev/null)
          PR_NUMBER=$(echo "$RESPONSE" | python3 -c "import json,sys;print(json.load(sys.stdin).get('number',''))" 2>/dev/null)
          echo "PR_URL=$PR_URL" >> $GITHUB_ENV
          echo "PR_NUMBER=$PR_NUMBER" >> $GITHUB_ENV
          echo "UPSTREAM_REPO=$UPSTREAM_REPO" >> $GITHUB_ENV
          if [ "$PR_URL" = "FAILED" ] || [ -z "$PR_URL" ]; then
            echo "PR creation failed!"
            exit 1
          fi

      - name: Result
        run: echo "PR created at $PR_URL"

      - name: 💾 Update state.json — register new active monitor
        env:
          PR_NUMBER: ${{ env.PR_NUMBER }}
          PR_URL: ${{ env.PR_URL }}
          UPSTREAM_REPO: ${{ env.UPSTREAM_REPO }}
          PR_TITLE: ${{ env.PR_TITLE_CLEAN }}
        run: |
          python3 - <<PYEOF
          import json, os, sys
          from pathlib import Path
          from datetime import datetime, timezone

          # Import the state_manager helpers (Cycle 16 dedup guard).
          # PYTHONPATH includes the repo root so 'src' is importable.
          sys.path.insert(0, str(Path.cwd()))
          from src.utils import state_manager

          upstream = os.environ["UPSTREAM_REPO"]
          pr_number_raw = os.environ.get("PR_NUMBER", "")
          pr_number = int(pr_number_raw) if pr_number_raw.isdigit() else pr_number_raw
          pr_url = os.environ.get("PR_URL", "")
          pr_title = os.environ.get("PR_TITLE", "")

          # Dedup guard: if a monitor for this (repo, pr_number) already exists,
          # update it in place instead of creating a duplicate entry.
          # (Cycle 15 root cause: bare 'owner/repo' and 'owner/repo#N' keys
          # for the same PR created orphan duplicates that confused pr-monitor.)
          existing_key = state_manager.find_monitor_by_pr(upstream, pr_number)
          if existing_key is not None:
              print(f"⚠️  Monitor for PR #{pr_number} on {upstream} already exists under key '{existing_key}' — updating in place")
              state = state_manager.read_state()
              monitor = state["active_monitors"][existing_key]
              monitor["pr_url"] = pr_url
              monitor["pr_title"] = pr_title
              monitor["status"] = "UNDER_REVIEW"
              monitor["updated_at"] = datetime.now(timezone.utc).isoformat()
              # Don't overwrite bounty_value/platform if already set (richer metadata wins)
              monitor.setdefault("bounty_value", "")
              monitor.setdefault("platform", "manual")
              monitor.setdefault("submitted_at", datetime.now(timezone.utc).isoformat())
          else:
              print(f"✅ No existing monitor for PR #{pr_number} on {upstream} — creating new entry")
              state = state_manager.read_state()
              state["active_monitors"][upstream] = {
                  "pr_number": pr_number,
                  "status": "UNDER_REVIEW",
                  "bounty_value": "",
                  "platform": "manual",
                  "pr_url": pr_url,
                  "pr_title": pr_title,
                  "submitted_at": datetime.now(timezone.utc).isoformat(),
              }

          state["current_execution_pointer"] = {
              "stage": "PR_SUBMITTED",
              "last_action": f"Submitted PR #{pr_number} to {upstream}",
              "current_target_repo": upstream,
          }
          state_manager.write_state(state)
          print(f"✅ state.json updated: monitor for {upstream} PR #{pr_number} registered")
          PYEOF

      - name: Commit state.json
        run: |
          git config user.name "bounty-hunter-bot"
          git config user.email "bot@airdropia-collection"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes — skipping commit"
          else
            # Commit message uses natural conventional-commit format
            # (persona layer applied here too — no 🤖 prefix).
            git commit -m "chore(state): register PR #${PR_NUMBER} on ${UPSTREAM_REPO}"
            # ─── Race condition mitigation (added 2026-07-18, Phase 1.2) ───
            # If another submit-pr.yml run committed state.json between our
            # checkout and now, our push will be rejected with "fetch first".
            # Retry up to 3 times with git pull --rebase before each push.
            for attempt in 1 2 3; do
              if git push origin main 2>&1; then
                echo "✅ Push succeeded on attempt $attempt"
                break
              else
                echo "⚠️ Push rejected (attempt $attempt) — likely concurrent submit-pr.yml run"
                echo "   Pulling latest with --rebase and retrying..."
                git pull --rebase origin main
                # Re-stage our commit on top of the rebase
                # (git already moved our commit; no re-add needed)
              fi
            done
          fi

      - name: 📱 Notify Telegram — PR Submitted (with control buttons)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Clean chat_id: remove spaces but keep leading minus (channel IDs start with -100)
          CHAT_ID=$(echo "$TELEGRAM_CHAT_ID" | tr -d '[:space:]')
          # Ensure format: optional leading minus + digits only
          if [[ "$CHAT_ID" == -* ]]; then
            CHAT_ID="-$(echo "${CHAT_ID:1}" | tr -cd '0-9')"
          else
            CHAT_ID=$(echo "$CHAT_ID" | tr -cd '0-9')
          fi
          MSG="🚀 *PR Submitted!*\n\n*Repo:* \`${UPSTREAM_REPO}\`\n*PR:* #${PR_NUMBER}\n*Title:* ${{ github.event.inputs.pr_title }}\n*URL:* ${PR_URL}\n\n⏳ Waiting for maintainer review..."
          # Build inline keyboard JSON for [🛑 Emergency Stop] / [▶️ Resume Flow]
          REPLY_MARKUP='{"inline_keyboard":[[{"text":"🛑 Emergency Stop","callback_data":"pause_system"},{"text":"▶️ Resume Flow","callback_data":"resume_system"}]]}'
          curl -sS -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"${MSG}\", \"parse_mode\": \"Markdown\", \"disable_web_page_preview\": true, \"reply_markup\": ${REPLY_MARKUP}}" \
            || echo "Telegram notification failed (non-blocking)"
