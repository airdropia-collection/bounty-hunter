name: 👀 PR Monitor (State-Aware)

on:
  workflow_dispatch:

permissions:
  contents: write  # required to commit state.json updates

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (to read/write state.json)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 1

      - name: Check PR statuses + update state.json + hourly heartbeat
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request
          from pathlib import Path
          from datetime import datetime, timezone

          gh_pat = os.environ['GH_PAT']
          tg_token = os.environ.get('TELEGRAM_BOT_TOKEN', '')

          # Clean chat_id (preserve leading minus for channels)
          raw = os.environ.get('TELEGRAM_CHAT_ID', '').replace(' ', '').replace('\t', '')
          if raw.startswith('-'):
              chat_id = '-' + ''.join(c for c in raw[1:] if c.isdigit())
          else:
              chat_id = ''.join(c for c in raw if c.isdigit())

          # ── Read state.json ──────────────────────────────────────── #
          state_path = Path('state.json')
          if not state_path.exists():
              print('⚠️ state.json missing — initializing empty')
              state = {
                  'system_status': 'RUNNING',
                  'active_monitors': {},
                  'blacklisted_repos': [],
                  'current_execution_pointer': {},
              }
          else:
              state = json.loads(state_path.read_text())

          monitors = state.get('active_monitors', {})

          # ── Inline keyboard for control buttons (agent.md §2) ───── #
          reply_markup = {
              'inline_keyboard': [[
                  {'text': '🛑 Emergency Stop', 'callback_data': 'pause_system'},
                  {'text': '▶️ Resume Flow', 'callback_data': 'resume_system'},
              ]]
          }

          def tg_send(text):
              if not (tg_token and chat_id):
                  return
              payload = json.dumps({
                  'chat_id': chat_id,
                  'text': text,
                  'parse_mode': 'Markdown',
                  'disable_web_page_preview': True,
                  'reply_markup': reply_markup,
              }).encode()
              req = urllib.request.Request(
                  f'https://api.telegram.org/bot{tg_token}/sendMessage',
                  data=payload,
                  headers={'Content-Type': 'application/json'},
              )
              try:
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print(f'  Telegram send failed: {e}')

          def gh_get(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      'Authorization': f'Bearer {gh_pat}',
                      'Accept': 'application/vnd.github+json',
                  },
              )
              return json.loads(urllib.request.urlopen(req, timeout=15).read())

          print(f'Tracking {len(monitors)} active PR(s)')

          # ── Map PR state → state.json status (agent.md §5) ──────── #
          state_changed = False
          for repo, monitor in list(monitors.items()):
              # Support composite keys like "claude-builders-bounty/claude-builders-bounty#3"
              # Strip the #N suffix for API URL construction
              api_repo = repo.split('#')[0] if '#' in repo else repo
              pr_num = monitor.get('pr_number')
              if not pr_num or not str(pr_num).isdigit():
                  continue
              old_status = monitor.get('status', 'UNDER_REVIEW')

              print(f'\n[{repo}] PR #{pr_num} (was: {old_status})')
              try:
                  pr_data = gh_get(f'https://api.github.com/repos/{api_repo}/pulls/{pr_num}')
              except Exception as e:
                  print(f'  ⚠️ API error: {e}')
                  continue

              gh_state = pr_data.get('state', 'unknown')
              gh_merged = pr_data.get('merged', False)
              gh_merged_at = pr_data.get('merged_at')
              pr_title = pr_data.get('title', '?')[:80]
              pr_url = pr_data.get('html_url', '?')

              # Determine new status
              if gh_merged or gh_merged_at:
                  new_status = 'MERGED'
              elif gh_state == 'closed':
                  new_status = 'CLOSED_AND_REJECTED'
              elif gh_state == 'open':
                  try:
                      reviews = gh_get(f'https://api.github.com/repos/{api_repo}/pulls/{pr_num}/reviews?per_page=50')
                      if any(r.get('state') == 'CHANGES_REQUESTED' for r in reviews):
                          new_status = 'NEEDS_REVISION'
                      else:
                          new_status = 'UNDER_REVIEW'
                  except Exception:
                      new_status = 'UNDER_REVIEW'
              else:
                  new_status = old_status

              print(f'  GitHub state={gh_state} merged={gh_merged} → state.json={new_status}')

              if new_status != old_status:
                  monitor['status'] = new_status
                  monitor['updated_at'] = datetime.now(timezone.utc).isoformat()
                  state_changed = True

                  if new_status == 'MERGED':
                      tg_send(
                          f'🎉 *PR MERGED!*\n'
                          f'━━━━━━━━━━━━━━━━━━\n'
                          f'📦 *Repo:* `{repo}`\n'
                          f'🔀 *PR:* #{pr_num}\n'
                          f'📝 *Title:* {pr_title}\n'
                          f'🔗 [View PR]({pr_url})\n'
                          f'💰 *Bounty payout may be processing!*\n'
                          f'━━━━━━━━━━━━━━━━━━'
                      )
                  elif new_status == 'CLOSED_AND_REJECTED':
                      tg_send(
                          f'❌ *PR CLOSED (not merged)*\n'
                          f'━━━━━━━━━━━━━━━━━━\n'
                          f'📦 *Repo:* `{repo}`\n'
                          f'🔀 *PR:* #{pr_num}\n'
                          f'📝 *Title:* {pr_title}\n'
                          f'🔗 [View PR]({pr_url})\n'
                          f'_Fork will be cleaned up at next cycle._\n'
                          f'━━━━━━━━━━━━━━━━━━'
                      )
                  elif new_status == 'NEEDS_REVISION':
                      tg_send(
                          f'🔧 *PR NEEDS REVISION*\n'
                          f'━━━━━━━━━━━━━━━━━━\n'
                          f'📦 *Repo:* `{repo}`\n'
                          f'🔀 *PR:* #{pr_num}\n'
                          f'📝 *Title:* {pr_title}\n'
                          f'🔗 [View PR]({pr_url})\n'
                          f'⚠️ *Maintainer requested changes.*\n'
                          f'━━━━━━━━━━━━━━━━━━'
                      )
                  elif new_status == 'UNDER_REVIEW' and old_status == 'NEEDS_REVISION':
                      tg_send(
                          f'👀 *PR BACK UNDER REVIEW*\n'
                          f'━━━━━━━━━━━━━━━━━━\n'
                          f'📦 *Repo:* `{repo}`\n'
                          f'🔀 *PR:* #{pr_num}\n'
                          f'━━━━━━━━━━━━━━━━━━'
                      )

          # ── Persist state.json ──────────────────────────────────── #
          state['active_monitors'] = monitors
          state['last_session_sync'] = datetime.now(timezone.utc).isoformat()
          state_path.write_text(json.dumps(state, indent=2, default=str))
          if state_changed:
              print('\n✅ state.json updated with new PR statuses')
          else:
              print('\nNo status changes detected')

          # ── Hourly heartbeat (always sent — agent.md §6) ─────────── #
          # Send a portfolio summary every run so the operator always
          # knows what the bot is doing + total bounty value at stake.
          print('\n📡 Sending hourly state heartbeat to Telegram...')
          try:
              import sys
              sys.path.insert(0, '.')
              from src.utils import state_manager
              heartbeat_text = state_manager.snapshot()
              tg_send(f'💓 *HOURLY HEARTBEAT*\n━━━━━━━━━━━━━━━━━━\n{heartbeat_text}\n━━━━━━━━━━━━━━━━━━')
              print('✅ Heartbeat sent')
          except Exception as e:
              print(f'⚠️ Heartbeat failed: {e}')
          PYEOF

      - name: Commit state.json if changed
        run: |
          git config user.name "bounty-hunter-bot"
          git config user.email "bot@airdropia-collection"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes — skipping commit"
          else
            git commit -m "🤖 bot: PR monitor updated state.json statuses"
            git push
            echo "✅ state.json committed"
          fi
